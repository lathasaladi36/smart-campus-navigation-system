<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sign in - Nav Page</title>
    <link rel="stylesheet"  href="styles.css">
</head>

<body>
<div class="header">
    <h2 id="userGreeting">Signed in User</h2>
    <div class="nav">
        <a href="#" class="help-button" onclick="handleLogout()">Logout</a>
        <a href="https://transportation.unt.edu/index.html" class="help-button"
           target="_blank">Contact</a>
    </div>
</div>

<div class="feature-container">

    <div class="left-panel">

        <!--Campus Toggle & other Tiles-->
        <div class="tile">

            <h4>Campus Selection</h4>
            <div class="Campus-Select">
                <button onclick="switchCampus('main')">Main Campus</button>
                <button onclick="switchCampus('discovery')">Discovery Park</button>
            </div>
        </div>

        <div class="tile">
            <h4>Favorites</h4>
            <ul style="list-style: none; padding:0; font-size: 14px;">
                <li onclick="searchLocation('Willis Library')" style="cursor: pointer;" >Willis Library</li>
                <li onclick="searchLocation('UNT Union')" style="cursor: pointer;" >UNT Union</li>
                <li onclick="searchLocation('UNT Rec Center')" style="cursor: pointer;" >Recreation Center</li>
            </ul>
        </div>

        <div class="tile">
            <h4>Shuttle Schedule</h4>
            <ul style="list-style: none; padding:0; font-size: 14px;">
                <li>
                    <a href="https://www.dcta.net/getting-around/rail-bus-services/university-routes"
                       target="_blank"
                       style="color: inherit; text-decoration: none;">
                        Bus Routes
                    </a>
                </li>

                <li>
                    <a href="https://transportation.unt.edu/campus-transit.html#bus%20service"
                       target="_blank"
                       style="color: inherit; text-decoration: none;">
                        Late Night Flight Service
                    </a>
                </li>

                <li>
                    <a href="https://account.lyft.com/auth?next=https%3A%2F%2Fwww.lyft.com%2Flyftpass%2FUNTFALL25"
                       target="_blank"
                       style="color: inherit; text-decoration: none;">
                        Free Lyft on Campus (2am-7am)
                    </a>
                </li>
            </ul>
        </div>

        <div class="tile">
            <h4>Parking</h4>
            <ul style="list-style: none; padding:0; font-size: 14px;">
                <li>
                    <a href="https://transportation.unt.edu/parking-permits.html"
                       target="_blank"
                       style="color: inherit; text-decoration: none;">
                        Parking Permit Info
                    </a>
                </li>
                <li>
                    <a href="https://experience.arcgis.com/experience/5b6f7d38a75b4f6e84c81eae31216267/?draft=true"
                       target="_blank"
                       style="color: inherit; text-decoration: none;">
                        Campus Parking Map
                    </a>
                </li>
            </ul>
        </div>

    </div>

    <div class="right-box" style="width: 95%;">
        <div class="search-box">
            <h3>Campus Map</h3>
            <div style="width: 110%;">
                <input type="text" id="locationInput" list="unt-locations" placeholder="Enter a location to search">
                <datalist id="unt-locations">
                    <option value="Willis Library, UNT">
                    <option value="Discovery Park, UNT">
                    <option value="University Union, UNT">
                    <option value="Eagle Student Services Center, UNT">
                    <option value="Coliseum, UNT">
                    <option value="Pohl Recreation Center, UNT">
                </datalist>
                <button onclick="searchLocation()">Search</button>
                <button onclick="clearSearch()">Clear</button>
            </div>
        </div>

        <div class="map-box">
            <iframe id="mapFrame" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d13388.46048106757!2d-97.1477!3d33.2109!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x864dca889c026b7d%3A0xc6a8043530e00f98!2sUniversity%20of%20North%20Texas!5e0!3m2!1sen!2sus!4v1700000000000"></iframe>
        </div>

    </div>
</div>


<script>
    // Search location function //
    function searchLocation() {
        const input = document.getElementById('locationInput');
        const location = input.value;
        if(location)
        {
            const mapFrame = document.getElementById('mapFrame');
            const embedUrl = `https://www.google.com/maps?q=${encodeURIComponent(location)}&output=embed`;
            mapFrame.src = embedUrl;
            console.log("Searching for:", location);
        }
        else
        {
            alert("Please enter a location to search.");
        }
    }

    function clearSearch() {
        const input = document.getElementById('locationInput');
        input.value = ""; // Empty the text box

        // Manually trigger the reset logic
        const mapFrame = document.getElementById('mapFrame');
        mapFrame.src = "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d13388.46048106757!2d-97.1477!3d33.2109!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x864dca889c026b7d%3A0xc6a8043530e00f98!2sUniversity%20of%20North%20Texas!5e0!3m2!1sen!2sus!4v1700000000000";
    }

    // Switch campus function //
    function switchCampus(campus) {
        const mapFrame = document.getElementById('mapFrame');

        if(campus === 'main') {
            mapFrame.src = "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d13388.46048106757!2d-97.1477!3d33.2109!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x864dca889c026b7d%3A0xc6a8043530e00f98!2sUniversity%20of%20North%20Texas!5e0!3m2!1sen!2sus!4v1700000000000";
        } else if(campus === 'discovery') {
            mapFrame.src = "https://www.google.com/maps?q=Discovery+Park+UNT+Denton&output=embed";
        }
    }

    document.addEventListener("DOMContentLoaded", function() {
        const savedName = localStorage.getItem("username");
        if (savedName) {
            document.getElementById("userGreeting").innerText = "Hello, " + savedName;
        }
    });

    function handleLogout() {
        // 1. Clear the specific 'username' key from memory
        localStorage.removeItem("username");

        // 2. (Optional) Clear everything if you have other session data
        // localStorage.clear();

        // 3. Redirect back to the login page
        alert("You have been logged out.");
        window.location.href = "homepage.html";
    }

    document.addEventListener("DOMContentLoaded", function() {
        const locationInput = document.getElementById('locationInput');
        const mapFrame = document.getElementById('mapFrame');

        // The "Standard" UNT Map URL (copy this from your initial iframe src)
        const standardMap = "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d13388.46048106757!2d-97.1477!3d33.2109!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x864dca889c026b7d%3A0xc6a8043530e00f98!2sUniversity%20of%20North%20Texas!5e0!3m2!1sen!2sus!4v1700000000000";

        locationInput.addEventListener('input', function() {
            // If the search bar is empty, reset the map
            if (this.value.trim() === "") {
                mapFrame.src = standardMap;
                console.log("Search cleared - Map reset to default.");
            }
        });
    });

</script>

</body>
</html>
