<!DOCTYPE html>
<html>
<head>
    <title>Smart Campus Navigation</title>
    <link rel="stylesheet"  href="styles.css">
    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background-image:url("1.jpg"); /* Full-page background changed to 1.jpg */
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
        }

        /* DARK MODE */
        #themeToggle{
            display:none;
        }

        #themeToggle:checked ~ .wrapper{
            background:rgba(18,18,18,0.9);
            color:white;
        }

        #themeToggle:checked ~ .wrapper .header{
            background:rgba(0,0,0,0.8);
        }

        #themeToggle:checked ~ .wrapper .left-box{
            background:rgba(30,30,30,0.9);
            color:white;
        }

        #themeToggle:checked ~ .wrapper .right-box{
            background:rgba(42,42,42,0.9);
            color:white;
        }

        /* WRAPPER */
        .wrapper{
            width:90%;
            margin:30px auto;
            padding:20px;
            background:rgba(255,255,255,0.8); /* slightly transparent to see background */
            border-radius:10px;
        }

        /* HEADER */
        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:10px;
            background:rgba(0,0,0,0.8);
            color:white;
            border-radius:8px;
        }

        .nav a{
            margin-left:20px;
            color:white;
            text-decoration:none;
            font-weight:bold;
        }

        .theme-btn{
            margin-left:20px;
            background:white;
            color:black;
            padding:5px 10px;
            cursor:pointer;
            border-radius:5px;
        }

        /* MAIN LAYOUT */
        .main{
            display:flex;
            margin-top:20px;
        }

        /* LEFT SIDE */
        .left-box{
            width:30%;
            padding:15px;
            text-align:center;
            background:rgba(255,255,255,0.8);
            border-radius:10px;
        }

        .left-box img{
            width:120px;
            margin-bottom:15px;
        }

        .left-box input{
            width:85%;
            padding:6px;
            margin:6px 0;
        }

        /* Hide radio buttons */
        input[type="radio"]{
            display:none;
        }

        /* Hide all forms */
        .form{
            display:none;
        }

        /* Show correct form */
        #signin:checked ~ .forms .form-signin{
            display:block;
        }

        #signup:checked ~ .forms .form-signup{
            display:block;
        }

        #guest:checked ~ .forms .form-guest{
            display:block;
        }

        /* Buttons */
        .button-group{
            margin-top:15px;
        }

        .button-group label{
            display:block;
            padding:8px;
            margin:6px 0;
            background:#007bff;
            color:white;
            cursor:pointer;
            border-radius:5px;
        }

        /* RIGHT SIDE */
        .right-box{
            width:70%;
            margin-left:20px;
            padding:15px;
            border-radius:10px;
            background:rgba(255,255,255,0.8); /* semi-transparent to show 1.jpg */
        }

        /* SEARCH BOX */
        .search-box{
            padding:15px;
            margin-bottom:20px;
            background:rgba(255,255,255,0.7);
            border-radius:8px;
        }

        .search-box input{
            width:75%;
            padding:8px;
            margin-right:5px;
        }

        .search-box button{
            padding:8px 12px;
            cursor:pointer;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
        }

        /* MAP BOX */
        .map-box{
            height:400px;
            border-radius:10px;
            overflow:hidden;
        }

        .map-box iframe{
            width:100%;
            height:100%;
            border:none; /* remove border */
        }
    </style>
</head>

<body>
<div id="customAlertModal" class="modal">
    <div class="modal-content" style="text-align: center; border: 3px solid #00853E;">
        <h3 id="alertTitle" style="color: #00853E; margin-top: 0;">Notification</h3>
        <p id="alertMessage"></p>
        <button onclick="closeCustomAlert()" class="help-button" style="margin-top: 15px;">OK</button>
    </div>
</div>
<!-- Dark Mode Toggle -->
<input type="checkbox" id="themeToggle">

<div class="wrapper">

    <!-- HEADER -->
    <div class="header">
        <h2>UNT Campus Navigation</h2>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- LEFT SIDE -->
        <div class="left-box">

            <img src="2.png" alt="Logo">

            <!-- Radio Controls -->
            <input type="radio" name="form" id="signin" checked>
            <input type="radio" name="form" id="signup">
            <input type="radio" name="form" id="guest">

            <!-- FORMS -->
            <div class="forms">

                <!-- SIGN IN -->
                <div class="form form-signin">
                    <h3>Sign In</h3>
                    <input type="text" placeholder="Student ID">
                    <input type="password" placeholder="Password">
                </div>

                <!-- SIGN UP -->
                <div class="form form-signup">
                    <h3>Student Sign Up</h3>
                    <input type="text" placeholder="Full Name">
                    <input type="text" placeholder="Student ID">
                    <input type="email" placeholder="Mail ID">
                    <input type="text" placeholder="Contact Number">
                    <input type="password" placeholder="Password">
                </div>

                <!-- Forgot Password -->
                <div class="input-group">
                    <a href="/forgot-password" class="forgot-link">Forgot password?</a>
                </div>

                <!-- Forgot Password Popup -->
                <div id="forgotPasswordModal" class="modal">
                    <div class="modal-content">
                        <span class="close-btn">&times;</span>

                        <div id="resetFormView">
                            <h2>Forgot your password?</h2>
                            <p>To reset your password, enter the email address you used to register.</p>
                            <form id="forgotPasswordForm">
                                <input type="email" id="resetEmail" placeholder="Email Address" required>
                                <button type="submit" class="reset-submit">Send Reset Link</button>
                            </form>
                        </div>

                        <div id="successView" style="display: none; text-align: center;">
                            <div class="success-icon">Check your email!</div>
                            <h2>Link Sent!</h2>
                            <p>We've sent a password reset link to <br><strong id="displayEmail"></strong></p>
                            <button type="button" class="reset-submit" id="backToLogin">Close</button>
                        </div>
                    </div>
                    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
                </div>

            </div>

            <!-- BUTTONS BELOW DETAILS -->
            <div class="button-group">
                <label for="signin" onclick="handleSignIn()">Sign In</label>
                <label for="signup" onclick="handleSignUp()">Sign Up</label>

                <div class="nav">
                    <a href="https://transportation.unt.edu/index.html" class="help-button"
                       target="_blank" rel="noopener noreferrer">Need Help?</a>
                </div>
            </div>

        </div>

        <!-- RIGHT SIDE -->
        <div class="right-box">

            <div class="search-box">
                <h3>Search Directions</h3>
                <input type="text" id="locationInput" placeholder="Enter a location...">
                <button onclick="searchLocation()">Search</button>
            </div>

            <div class="map-box">
                <iframe id="mapFrame" src="https://www.google.com/maps?q=University&output=embed"></iframe>
            </div>

        </div>

    </div>

</div>

<script>

    function showCustomAlert(message, title = "Notification") {
   document.getElementById('alertTitle').innerText = title;
   document.getElementById('alertMessage').innerText = message;
   document.getElementById('customAlertModal').style.display = 'flex';
}

function closeCustomAlert() {
   document.getElementById('customAlertModal').style.display = 'none';
}
   // --- 1. STUDENT SIGN UP FUNCTION ---
   async function handleSignUp() {
       const fullName = document.querySelector('.form-signup input[placeholder="Full Name"]').value;
       const studentId = document.querySelector('.form-signup input[placeholder="Student ID"]').value;
       const email = document.querySelector('.form-signup input[placeholder="Mail ID"]').value;
       const contactNumber = document.querySelector('.form-signup input[placeholder="Contact Number"]').value;
       const password = document.querySelector('.form-signup input[placeholder="Password"]').value;

       // 1. Check for empty fields
       if (!fullName || !studentId || !email || !contactNumber || !password) {
           showCustomAlert("All fields are required!");
           return;
       }

       // 2. Validate Phone Number (must be exactly 10 digits)
       const phonePattern = /^\d{10}$/;
       if (!phonePattern.test(contactNumber)) {
           showCustomAlert("Please enter a valid 10-digit phone number.");
           return;
       }

       // 3. Validate Password Strength (Min 8 characters)
       if (password.length < 8) {
           showCustomAlert("Password is too weak! It must be at least 8 characters long.");
           return;
       }

       // 4. Validate Email Format (Basic check)
       if (!email.includes("@")) {
           showCustomAlert("Please enter a valid email address.");
           return;
       }

       // If all checks pass, proceed to fetch
       try {
           const response = await fetch('/api/auth/signup', {
               method: 'POST',
               headers: { 'Content-Type': 'application/json' },
               body: JSON.stringify({ fullName, studentId, email, contactNumber, password })
           });

           if (response.ok) {
               showCustomAlert("Registration Successful!");
               document.getElementById('signin').checked = true;
           } else {
               const errorMsg = await response.text();
               showCustomAlert("Error: " + errorMsg);
           }
       } catch (err) {
           showCustomAlert("Server error. Check your IntelliJ connection.");
       }
   }


   // --- 2. STUDENT SIGN IN FUNCTION ---
   async function handleSignIn() {
   const studentId = document.querySelector('.form-signin input[placeholder="Student ID"]').value;
   const password = document.querySelector('.form-signin input[placeholder="Password"]').value;

   if (!studentId || !password) {
       showCustomAlert("Please enter both Student ID and Password to Sign In");
       return;
   }

   try {
       const response = await fetch('/api/auth/signin', {
           method: 'POST',
           headers: { 'Content-Type': 'application/json' },
           body: JSON.stringify({ studentId, password })
       });

       if (response.ok) {
           // 1. Parse the JSON object from the response
           const studentData = await response.json();

           // 2. Save the SPECIFIC fullName property to localStorage
           // This ensures navpage.html can find the name later
           localStorage.setItem("username", studentData.fullName);

           // 3. Update the alert to show only the Name, not the whole object
           showCustomAlert("Welcome, " + studentData.fullName, "Sign-in Successful");

           // 4. Redirect to your navigation page
           setTimeout(() => {
        window.location.href = "navpage.html";
    }, 2000);
       } else {
           const errorMsg = await response.text();
           alert("Login Failed: " + errorMsg);
       }
   } catch (error) {
       alert("Server error. Check your connection to the Spring Boot backend.");
   }
}

   // --- 3. MAP SEARCH FUNCTION ---
   function searchLocation() {
       const location = document.getElementById('locationInput').value;
       if (location) {
           const mapFrame = document.getElementById('mapFrame');
           // Using encodeURIComponent to handle spaces and special characters in the search
           mapFrame.src = `https://www.google.com/maps?q=${encodeURIComponent(location)}&output=embed`;
       }
   }

   //----3. Forgot Password for Users ----
   const modal = document.getElementById("forgotPasswordModal");
   const forgotLink = document.querySelector(".forgot-link");
   const closeBtn = document.querySelector(".close-btn");

   // ---Add the Event Listener to the link----
   forgotLink.addEventListener("click", function(event) {
       event.preventDefault();    // Prevents the browser from following the "/forgot-password" URL
       modal.style.display = "flex"; // Shows the popup (using flex helps with centering)
   });

   //--- Add Event Listener to close button---
   closeBtn.addEventListener("click", function() {
       modal.style.display = "none";
   });

   //---Close if user clicks outside the modal content---
   window.addEventListener("click", function(event) {
       if (event.target === modal) {
           modal.style.display = "none";
       }
   });

   //---Forgot Password Link Success Message---
   // Wait for the document to be fully loaded
   document.addEventListener("DOMContentLoaded", function() {

       // 1. Initialize EmailJS
       emailjs.init("kTiq8VdYfrMio653R");

       // 2. Select Elements
       const forgotForm = document.getElementById("forgotPasswordForm");
       const resetFormView = document.getElementById("resetFormView");
       const successView = document.getElementById("successView");
       const displayEmail = document.getElementById("displayEmail");
       const modal = document.getElementById("forgotPasswordModal");
       const forgotLink = document.querySelector(".forgot-link");
       const closeBtn = document.querySelector(".close-btn");

       // 3. Open Modal Logic
       if(forgotLink) {
           forgotLink.addEventListener("click", (e) => {
               e.preventDefault();
               modal.style.display = "flex";
           });
       }

       // 4. Form Submission Logic
       if (forgotForm) {
           forgotForm.addEventListener("submit", async function(e) {
               e.preventDefault();
               const emailInput = document.getElementById("resetEmail");
               const submitBtn = forgotForm.querySelector(".reset-submit");

               submitBtn.innerText = "Verifying...";
               submitBtn.disabled = true;

               try {
                   // 1. Verify if user exists in the Student table
                   const verifyResponse = await fetch(`/api/auth/verify-email?email=${emailInput.value}`, {
                       method: 'POST'
                   });

                   if (verifyResponse.ok) {
                       // 2. User exists! Now send the email via EmailJS
                       const templateParams = {
                           to_email: emailInput.value,
                           reset_link: "https://myapp.com/reset?token=" + Math.random().toString(36).substring(7)
                       };

                       await emailjs.send('service_6ugpbvz', 'template_ca78xdn', templateParams);

                       // Show success view
                       displayEmail.textContent = emailInput.value;
                       resetFormView.style.display = "none";
                       successView.style.display = "block";
                   } else {
                       // 3. User doesn't exist! Show popup/alert
                       alert("User doesn't exist. Please register first.");
                       submitBtn.innerText = "Send Reset Link";
                       submitBtn.disabled = false;
                   }
               } catch (error) {
                   alert("Server error. Please ensure your Spring Boot app is running.");
                   submitBtn.innerText = "Send Reset Link";
                   submitBtn.disabled = false;
               }
           });
       }
   });

    //Function to store user location
    window.onload = function() {
        if (navigator.geolocation) {
            // This triggers the browser popup on the homepage
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    console.log("Location access granted.");
                    // Store coordinates so Navpage can read them without asking again
                    localStorage.setItem("userLat", position.coords.latitude);
                    localStorage.setItem("userLon", position.coords.longitude);
                },
                (error) => {
                    console.warn("Location access denied or timed out.");
                    // Clear old data if they deny access
                    localStorage.removeItem("userLat");
                    localStorage.removeItem("userLon");
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }
    };
</script>

</body>
</html>
